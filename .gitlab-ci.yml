cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .cache/pip

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DOCS_PORT: "8000"        # Port mkdocs serve listens on
  SERVE_HOST: "0.0.0.0"   # Bind to all interfaces; use 127.0.0.1 for localhost-only

stages:
  - build
  - test
  - deploy

# Build the MkDocs site
build:
  stage: build
  tags:
    - shell    # Must match your shell-executor runner tag
  before_script:
    - pip install --no-cache-dir -r requirements.txt
  script:
    - mkdocs build --strict --site-dir public
  artifacts:
    paths:
      - public
    expire_in: 1 hour

# Validate internal links; failures warn but don't block deploy
test:link-check:
  stage: test
  tags:
    - shell
  needs: [build]
  before_script:
    - pip install --no-cache-dir linkchecker
  script:
    - linkchecker --no-warnings --ignore-url="^mailto:" public/index.html
  allow_failure: true

# Deploy: restart the mkdocs serve process via systemd
# Prerequisites on the runner machine:
#   1. Create /etc/systemd/system/mkdocs.service (template below)
#   2. Run: sudo systemctl enable mkdocs
#   3. Grant the runner user passwordless sudo for systemctl restart mkdocs:
#      echo "gitlab-runner ALL=(ALL) NOPASSWD: /bin/systemctl restart mkdocs" \
#        | sudo tee /etc/sudoers.d/gitlab-runner-mkdocs
#
# /etc/systemd/system/mkdocs.service:
# [Unit]
# Description=MkDocs documentation server
# After=network.target
#
# [Service]
# Type=simple
# User=gitlab-runner
# WorkingDirectory=/path/to/your/repo          # <-- set to your repo path
# ExecStart=/usr/local/bin/mkdocs serve --dev-addr 0.0.0.0:8000
# Restart=on-failure
#
# [Install]
# WantedBy=multi-user.target
deploy:
  stage: deploy
  tags:
    - shell
  needs: [build]
  script:
    - sudo systemctl restart mkdocs
    - echo "Docs live at http://$(hostname -I | awk '{print $1}'):${DOCS_PORT}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
